name: Create release

env:
  CARGO_TERM_COLOR: always

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version"
        required: false
        default: ""

jobs:
  prepare_release:
    runs-on: windows-latest
    steps:
      - name: Configure git
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Bump version
        id: bump_version
        env:
          RUST_BACKTRACE: 1
        run: |
          $versionInput = "${{ github.event.inputs.version }}"
          if ($versionInput.Length -gt 0) {
            $out = cargo xtask bump --version $versionInput
          } else {
            $out = cargo xtask bump
          }
          echo $out
          cargo update -p alvr_common
          $tag = ($out | Select-String -CaseSensitive -Pattern '^v.*$').Line
          "version_tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Push changes
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "[Auto] Bump version"

      - name: Install dependencies
        uses: crazy-max/ghaction-chocolatey@v3
        with:
          args: install zip unzip pkgconfiglite wixtoolset

      - name: Build and package ALVR
        id: build
        env:
          RUST_BACKTRACE: 1
          LIBCLANG_PATH: 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\Llvm\x64\bin'
        run: |
          cargo xtask package-streamer --gpl --ci
          cargo xtask package-launcher --ci

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump_version.outputs.version_tag }}
          target_commitish: ${{ steps.auto_commit.outputs.changes_detected == 'true' && steps.auto_commit.outputs.commit_hash || github.sha }}
          name: ALVR ${{ steps.bump_version.outputs.version_tag }} Windows Server Only (Quest 3 v20.14.0 APK compatible)
          draft: true
          body: |
            This is a **server-only** Windows release for the ALVR v20.14.0 Quest 3 fork.

            It does **not** include a rebuilt Android client. Use this release with the existing Quest 3 v20.14.0 client APK.

            Included artifacts:
            - `alvr_streamer_windows.zip` — Windows streamer
            - `alvr_launcher_windows.zip` — Windows launcher
          files: |
            build/alvr_streamer_windows.zip
            build/alvr_launcher_windows.zip
          fail_on_unmatched_files: true
